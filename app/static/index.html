<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hai</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f12;
    --surface: #1a1a22;
    --surface2: #23232d;
    --border: #2e2e3a;
    --text: #e8e8f0;
    --muted: #7878a0;
    --accent: #9d7cfe;
    --accent-soft: #2d1f5e;
    --user-bubble: #1e2a3a;
    --persona-bubble: #221a35;
    --delay-color: #f0a050;
    --post-bg: #1c1c28;
    --green: #4ade80;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    margin-right: 8px;
  }

  .persona-tabs {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow-x: auto;
  }

  .tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .advance-btn {
    padding: 8px 18px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .advance-btn:hover { background: var(--accent); color: #fff; }
  .advance-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Persona bar ── */
  .persona-bar {
    padding: 10px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    min-height: 48px;
  }

  .cycle-badge {
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .mood-text {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .vibe-tag {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    white-space: nowrap;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Chat pane ── */
  .chat-pane {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    border-right: 1px solid var(--border);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message-row.user { align-items: flex-end; }
  .message-row.persona { align-items: flex-start; }

  .bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2a3a50;
    border-bottom-right-radius: 4px;
  }

  .persona .bubble {
    background: var(--persona-bubble);
    border: 1px solid #3a2a50;
    border-bottom-left-radius: 4px;
  }

  .delay-badge {
    font-size: 11px;
    color: var(--delay-color);
    padding: 2px 8px;
    border-radius: 8px;
    background: rgba(240, 160, 80, 0.1);
    border: 1px solid rgba(240, 160, 80, 0.2);
    align-self: flex-end;
  }

  .persona .delay-badge { align-self: flex-start; }

  .typing-indicator {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--persona-bubble);
    border: 1px solid #3a2a50;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator.show { display: flex; }

  .dot {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .input-area textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    resize: none;
    height: 42px;
    max-height: 120px;
    line-height: 1.5;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    overflow-y: auto;
  }

  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--muted); }

  .send-btn {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    align-self: flex-end;
    height: 42px;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Feed pane ── */
  .feed-pane {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .feed-header {
    padding: 14px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .post-card {
    background: var(--post-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .post-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .post-author {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .post-cycle {
    font-size: 11px;
    color: var(--muted);
  }

  .post-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .react-btn {
    padding: 3px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.1s;
  }
  .react-btn:hover { border-color: var(--accent); color: var(--text); }
  .react-btn.reacted { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  /* ── Cycle overlay ── */
  .cycle-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .cycle-overlay.show { display: flex; }

  .cycle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 90%;
    animation: slideIn 0.2s ease;
  }

  .cycle-card h2 {
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .event-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .event-item {
    font-size: 13px;
    color: var(--text);
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    line-height: 1.5;
  }

  .mood-update {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
  }

  .posted-notice {
    font-size: 12px;
    color: var(--green);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .close-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }

  /* ── Empty states ── */
  .empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
  }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 640px) {
    .feed-pane { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">hai</div>
  <div class="persona-tabs" id="persona-tabs">
    <div class="empty" style="padding:0;font-size:13px;">Loading personas…</div>
  </div>
  <button class="advance-btn" id="advance-btn" onclick="advanceDay()">⟳ Advance Day</button>
</header>

<div class="persona-bar" id="persona-bar">
  <span class="mood-text" id="mood-display">Select a persona to begin</span>
</div>

<div class="main">
  <div class="chat-pane">
    <div class="messages" id="messages">
      <div class="empty" id="chat-empty">Select a persona and start chatting, or advance a day to seed their journal.</div>
    </div>
    <div class="input-area">
      <textarea
        id="input"
        placeholder="Message…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="feed-pane">
    <div class="feed-header">Feed</div>
    <div class="feed-list" id="feed-list">
      <div class="empty">No posts yet. Advance a day to see if your persona posts.</div>
    </div>
  </div>
</div>

<!-- Cycle result overlay -->
<div class="cycle-overlay" id="cycle-overlay">
  <div class="cycle-card">
    <h2 id="cycle-title">Day Advanced</h2>
    <ul class="event-list" id="cycle-events"></ul>
    <div class="mood-update" id="cycle-mood"></div>
    <div class="posted-notice" id="cycle-posted" style="display:none">✦ Posted to feed</div>
    <button class="close-btn" onclick="closeCycleOverlay()">Continue</button>
  </div>
</div>

<div class="typing-indicator" id="typing">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>

<script>
  let activePersonaId = null;
  let personas = [];

  // ── Bootstrap ──────────────────────────────────────────────────────────────

  async function init() {
    try {
      personas = await fetch('/personas').then(r => r.json());
      renderTabs();
      if (personas.length > 0) {
        await selectPersona(personas[0].profile_id);
      }
    } catch (e) {
      console.error('Init failed:', e);
    }
  }

  function renderTabs() {
    const container = document.getElementById('persona-tabs');
    if (!personas.length) { container.innerHTML = '<div class="empty" style="padding:0;font-size:13px;">No personas found. Run generate_profiles.py first.</div>'; return; }
    container.innerHTML = personas.map(p => `
      <button class="tab ${p.profile_id === activePersonaId ? 'active' : ''}"
              onclick="selectPersona('${p.profile_id}')">${p.name}</button>
    `).join('');
  }

  async function selectPersona(personaId) {
    activePersonaId = personaId;
    renderTabs();

    // Update persona bar
    const p = personas.find(x => x.profile_id === personaId);
    if (p) {
      const bar = document.getElementById('persona-bar');
      bar.innerHTML = `
        <span class="cycle-badge">Day ${p.cycle_count}</span>
        <span class="mood-text">${p.mood}</span>
        <span class="vibe-tag">${p.energy_vibe}</span>
        <span class="vibe-tag">${p.relationship_type}</span>
      `;
    }

    await loadChat();
    await loadFeed();
  }

  // ── Chat ──────────────────────────────────────────────────────────────────

  async function loadChat() {
    if (!activePersonaId) return;
    const msgs = await fetch(`/personas/${activePersonaId}/chat`).then(r => r.json());
    renderMessages(msgs);
  }

  function renderMessages(msgs) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('chat-empty');
    if (!msgs.length) {
      container.innerHTML = '<div class="empty" id="chat-empty">Select a persona and start chatting, or advance a day to seed their journal.</div>';
      return;
    }
    container.innerHTML = msgs.map(m => `
      <div class="message-row ${m.role}">
        <div class="bubble">${escHtml(m.text)}</div>
        ${m.role === 'persona' ? `<div class="delay-badge">⏱ ${m.delay_bucket}</div>` : ''}
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  function appendMessage(role, text, delayBucket) {
    const container = document.getElementById('messages');
    // Remove empty placeholder if present
    const empty = container.querySelector('.empty');
    if (empty) empty.remove();

    const row = document.createElement('div');
    row.className = `message-row ${role}`;
    row.innerHTML = `
      <div class="bubble">${escHtml(text)}</div>
      ${role === 'persona' ? `<div class="delay-badge">⏱ ${delayBucket}</div>` : ''}
    `;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    if (!activePersonaId) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    setInputEnabled(false);

    appendMessage('user', text, 'immediate');

    // Show typing indicator inside the messages div
    const typing = document.getElementById('typing');
    const container = document.getElementById('messages');
    container.appendChild(typing);
    typing.classList.add('show');
    container.scrollTop = container.scrollHeight;

    try {
      const res = await fetch(`/personas/${activePersonaId}/message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      typing.classList.remove('show');
      appendMessage('persona', data.reply, data.delay_bucket);
    } catch (e) {
      typing.classList.remove('show');
      appendMessage('persona', '[Error getting reply. Check server logs.]', 'immediate');
    } finally {
      setInputEnabled(true);
      input.focus();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function setInputEnabled(enabled) {
    document.getElementById('send-btn').disabled = !enabled;
    document.getElementById('input').disabled = !enabled;
    document.getElementById('advance-btn').disabled = !enabled;
  }

  // ── Cycle ─────────────────────────────────────────────────────────────────

  async function advanceDay() {
    if (!activePersonaId) return;
    setInputEnabled(false);
    document.getElementById('advance-btn').textContent = '…';

    try {
      const res = await fetch(`/personas/${activePersonaId}/cycle`, { method: 'POST' });
      const data = await res.json();

      // Update local persona cache
      const p = personas.find(x => x.profile_id === activePersonaId);
      if (p) {
        p.cycle_count = data.cycle_count;
        p.mood = data.mood;
      }

      // Refresh persona bar
      await selectPersona(activePersonaId);

      // Show results overlay
      showCycleOverlay(data);

      // Reload feed if there's a new post
      if (data.post) await loadFeed();

    } catch (e) {
      alert('Error advancing day. Check server logs.');
    } finally {
      document.getElementById('advance-btn').textContent = '⟳ Advance Day';
      setInputEnabled(true);
    }
  }

  function showCycleOverlay(data) {
    const p = personas.find(x => x.profile_id === activePersonaId);
    document.getElementById('cycle-title').textContent = `${p ? p.name + ' — ' : ''}Day ${data.cycle_count}`;

    const evList = document.getElementById('cycle-events');
    evList.innerHTML = (data.events || []).map(e =>
      `<li class="event-item">${escHtml(e)}</li>`
    ).join('');

    document.getElementById('cycle-mood').textContent = `Mood: ${data.mood}`;

    const postedEl = document.getElementById('cycle-posted');
    postedEl.style.display = data.post ? 'flex' : 'none';

    document.getElementById('cycle-overlay').classList.add('show');
  }

  function closeCycleOverlay() {
    document.getElementById('cycle-overlay').classList.remove('show');
  }

  // ── Feed ──────────────────────────────────────────────────────────────────

  async function loadFeed() {
    if (!activePersonaId) return;
    const posts = await fetch(`/feed/${activePersonaId}`).then(r => r.json());
    renderFeed(posts);
  }

  function renderFeed(posts) {
    const container = document.getElementById('feed-list');
    if (!posts.length) {
      container.innerHTML = '<div class="empty">No posts yet. Advance a day to see if your persona posts.</div>';
      return;
    }
    container.innerHTML = posts.map(p => {
      const persona = personas.find(x => x.profile_id === p.persona_id);
      const name = persona ? persona.name : p.persona_id;
      return `
        <div class="post-card" data-post-id="${p.post_id}">
          <div class="post-meta">
            <span class="post-author">${escHtml(name)}</span>
            <span class="post-cycle">Day ${p.cycle}</span>
          </div>
          <div class="post-text">${escHtml(p.post_text)}</div>
          <div class="post-actions">
            ${['❤️','🔥','✨','💬'].map(emoji =>
              `<button class="react-btn" onclick="react('${p.post_id}','${p.persona_id}',this,'emoji','${emoji}')">${emoji}</button>`
            ).join('')}
          </div>
        </div>
      `;
    }).join('');
  }

  async function react(postId, personaId, btn, type, value) {
    btn.classList.toggle('reacted');
    try {
      await fetch('/reactions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ post_id: postId, persona_id: personaId, reaction_type: type, reaction_value: value }),
      });
    } catch (e) { console.error('React failed:', e); }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  init();
</script>
</body>
</html>
